<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ação 8504 – IPREV/DF · 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 13px; }

.header {
  background: linear-gradient(135deg, #00347A 0%, #001f4d 100%);
  color: white; padding: 12px 28px;
  display: flex; align-items: center; gap: 16px;
}
.header-logo {
  width: 42px; height: 42px; background: white; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #00347A; font-size: 11px; flex-shrink: 0;
}
.header-text h1 { font-size: 10px; font-weight: 400; opacity: .8; }
.header-text h2 { font-size: 13px; font-weight: 700; margin: 1px 0; }
.header-text h3 { font-size: 10.5px; font-weight: 600; opacity: .9; margin-top: 1px; }
.header-meta { margin-left: auto; text-align: right; }
.header-meta .acao  { font-size: 18px; font-weight: 900; }
.header-meta .sub   { font-size: 11px; font-weight: 600; opacity: .85; margin-top: 1px; }
.header-meta .ref   { font-size: 10px; opacity: .65; margin-top: 2px; }

.container { padding: 16px 24px; max-width: 1300px; margin: 0 auto; }

/* KPI CARDS */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi {
  background: white; border-radius: 8px; padding: 13px 15px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08); border-left: 3px solid;
}
.kpi.blue    { border-color: #00347A; }
.kpi.teal    { border-color: #00838f; }
.kpi.amber   { border-color: #e65100; }
.kpi.red     { border-color: #c62828; }
.kpi.green   { border-color: #2e7d32; }
.kpi-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .4px; color: #666; margin-bottom: 4px; }
.kpi-val { font-size: 18px; font-weight: 800; line-height: 1.1; }
.kpi-sub { font-size: 9.5px; color: #888; margin-top: 3px; }
.badge {
  display: inline-block; font-size: 9.5px; font-weight: 700;
  padding: 1px 7px; border-radius: 20px; margin-top: 4px;
}
.badge-ok  { background: #e8f5e9; color: #2e7d32; }
.badge-def { background: #ffebee; color: #c62828; }
.badge-neu { background: #e3f2fd; color: #00347A; }

/* SECTION LABEL */
.section-lbl {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: #00347A; margin-bottom: 8px; margin-top: 4px;
}

/* CHARTS */
.chart-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; margin-bottom: 16px; }
.chart-card {
  background: white; border-radius: 8px; padding: 16px 18px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.chart-title { font-size: 12px; font-weight: 700; color: #222; margin-bottom: 2px; }
.chart-sub   { font-size: 10px; color: #888; margin-bottom: 12px; }
.chart-wrap  { position: relative; height: 220px; }

/* VARIATION TABLE */
.table-card {
  background: white; border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  overflow: hidden; margin-bottom: 16px;
}
.table-title {
  padding: 10px 16px; font-size: 12px; font-weight: 800;
  color: #00347A; border-bottom: 2px solid #e3f2fd;
  display: flex; align-items: center; justify-content: space-between;
}
.table-sub { font-size: 10px; color: #888; font-weight: 400; }

table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead tr { background: #00347A; color: white; }
thead th {
  padding: 7px 10px; text-align: right; font-weight: 600;
  font-size: 10px; text-transform: uppercase; letter-spacing: .3px;
  white-space: nowrap;
}
thead th:first-child { text-align: left; padding-left: 16px; }

tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .1s; }
tbody tr:hover { background: #f0f4ff; }
tbody td { padding: 8px 10px; text-align: right; white-space: nowrap; }
tbody td:first-child { text-align: left; padding-left: 16px; font-weight: 700; }

tr.row-proj td { color: #e65100; font-style: italic; }
tr.row-2026 { background: #fff8e1; }
tr.row-2026 td:first-child { font-weight: 800; color: #00347A; }
tr.row-total-2026 { background: #00347A !important; }
tr.row-total-2026 td { color: white; font-weight: 800; padding: 10px 10px; }
tr.row-total-2026 td:first-child { padding-left: 16px; }

.var-pos { color: #2e7d32; font-weight: 700; }
.var-neg { color: #c62828; font-weight: 700; }

.tag-proj {
  display: inline-block; font-size: 9px; font-weight: 700;
  background: #fff3e0; color: #e65100; border: 1px solid #ffcc80;
  padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle;
}

.footer { text-align: center; font-size: 10px; color: #aaa; padding: 10px; }

@media (max-width: 900px) {
  .kpi-row   { grid-template-columns: 1fr 1fr; }
  .chart-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script>
// ══ DADOS ════════════════════════════════════════════════════════
const CFG = {
  orgao:      "SECRETARIA DE ESTADO DE ECONOMIA DO DISTRITO FEDERAL",
  unid1:      "SUOP – Subsecretaria de Orçamento Público",
  unid2:      "CODEP – Coordenação de Gestão de Despesas com Pessoal",
  uo:         "19213 – IPREV/DF",
  acao:       "AÇÃO 8504",
  sub:        "Sub 27 · Concessão a Servidores",
  mesRef:     "Mai/2026",
  numMes:     5,
  atualizado: "16/06/2026",
};

// Totais anuais realizados/projetados
const HISTORICO = [
  { ano: 2021, total: 7985960.64,  var: null },
  { ano: 2022, total: 6763427.97,  var: -15.31 },
  { ano: 2023, total: 7018241.70,  var:   3.77 },
  { ano: 2024, total: 8834190.29,  var:  25.87 },
  { ano: 2025, total: 10811645.11, var:  22.38 },
  { ano: 2026, total: 12813462.36, var:  18.52, proj: true,
    dotacao: 5983169.00, deficit: -6830293.36 },
];

// Mensais 2026 (jan-mai = realizado; jun-dez = projeção)
const MESES_2026 = {
  labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
  real:   [950257, 1177719, 1146757, 990768, 1073442],
  proj:   [1067789, 1067789, 1067789, 1067789, 1067789, 1067789, 1067789],
};

const realizado2026 = MESES_2026.real.reduce((a,b) => a+b, 0);
const proj2026      = HISTORICO.find(h => h.ano === 2026);

// Formatadores
function fBRL(v, dec=0) {
  if (v == null) return '–';
  const neg = v < 0;
  const s = new Intl.NumberFormat('pt-BR', {
    minimumFractionDigits: dec, maximumFractionDigits: dec
  }).format(Math.abs(v));
  return neg ? `(${s})` : s;
}
function fMi(v) {
  const abs = Math.abs(v);
  const n = new Intl.NumberFormat('pt-BR', {
    minimumFractionDigits: 1, maximumFractionDigits: 1
  }).format(abs / 1e6);
  return 'R$ ' + n + ' Mi';
}
</script>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">GDF</div>
  <div class="header-text">
    <h1 id="hOrgao"></h1>
    <h2 id="hUnid1"></h2>
    <h3 id="hUnid2"></h3>
  </div>
  <div class="header-meta">
    <div class="acao" id="hAcao"></div>
    <div class="sub"  id="hSub"></div>
    <div class="ref"  id="hRef"></div>
  </div>
</div>

<div class="container">

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- CHARTS -->
  <div class="chart-row">
    <div class="chart-card">
      <div class="chart-title">Histórico de Execução Anual</div>
      <div class="chart-sub">Total realizado/projetado por exercício · R$</div>
      <div class="chart-wrap"><canvas id="histChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Execução Mensal 2026</div>
      <div class="chart-sub">Realizado (azul) e Projeção (laranja) · R$</div>
      <div class="chart-wrap"><canvas id="mensalChart"></canvas></div>
    </div>
  </div>

  <!-- TABELA HISTÓRICO -->
  <div class="table-card">
    <div class="table-title">
      Execução por Exercício
      <span class="table-sub">UO: <b id="tUO"></b> · Atualizado em <b id="tAtu"></b></span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="text-align:left">Exercício</th>
          <th>Total Realizado / Projetado</th>
          <th>Var. %</th>
          <th>Dot. Autorizada</th>
          <th>Sup / Déf</th>
        </tr>
      </thead>
      <tbody id="histBody"></tbody>
    </table>
  </div>

</div>

<div class="footer" id="footer"></div>

<script>
// ─── Labels ──────────────────────────────────────────────────────
document.getElementById('hOrgao').textContent  = CFG.orgao;
document.getElementById('hUnid1').textContent  = CFG.unid1;
document.getElementById('hUnid2').textContent  = CFG.unid2;
document.getElementById('hAcao').textContent   = CFG.acao;
document.getElementById('hSub').textContent    = CFG.sub + ' · ' + CFG.uo;
document.getElementById('hRef').textContent    = 'Ref.: ' + CFG.mesRef + '  |  Atualizado: ' + CFG.atualizado;
document.getElementById('tUO').textContent     = CFG.uo;
document.getElementById('tAtu').textContent    = CFG.atualizado;
document.getElementById('footer').textContent  =
  CFG.acao + ' – Sub 27 · ' + CFG.uo + ' · Ref. ' + CFG.mesRef + ' · Atualizado em ' + CFG.atualizado;

// ─── KPIs ─────────────────────────────────────────────────────────
(function() {
  const pct = +(realizado2026 / proj2026.dotacao * 100).toFixed(1);
  const cards = [
    {
      cls: 'blue', lbl: 'Dotação Autorizada 2026',
      val: fMi(proj2026.dotacao),
      sub: CFG.uo,
      badge: 'badge-neu', badgeTxt: CFG.acao,
    },
    {
      cls: 'teal', lbl: 'Realizado Jan–' + CFG.mesRef.split('/')[0] + '/2026',
      val: fMi(realizado2026),
      sub: pct + '% da dotação autorizada',
      badge: 'badge-neu', badgeTxt: pct + '% executado',
    },
    {
      cls: 'amber', lbl: 'Projeção Anual 2026',
      val: fMi(proj2026.total),
      sub: 'Variação vs 2025: +' + proj2026.var + '%',
      badge: 'badge-def', badgeTxt: '▲ ' + proj2026.var + '% vs 2025',
    },
    {
      cls: 'red', lbl: 'Déficit Projetado 2026',
      val: fMi(Math.abs(proj2026.deficit)),
      sub: 'Projeção supera dotação em ' + (proj2026.total / proj2026.dotacao * 100).toFixed(0) + '%',
      badge: 'badge-def', badgeTxt: '▼ Déficit',
    },
  ];
  const row = document.getElementById('kpiRow');
  cards.forEach(c => {
    row.innerHTML += `<div class="kpi ${c.cls}">
      <div class="kpi-lbl">${c.lbl}</div>
      <div class="kpi-val">${c.val}</div>
      <div class="kpi-sub">${c.sub}</div>
      <span class="badge ${c.badge}">${c.badgeTxt}</span>
    </div>`;
  });
})();

// ─── Tabela histórico ─────────────────────────────────────────────
(function() {
  const tb = document.getElementById('histBody');
  HISTORICO.forEach(h => {
    const varHtml = h.var == null ? '–'
      : `<span class="${h.var >= 0 ? 'var-pos' : 'var-neg'}">${h.var > 0 ? '+' : ''}${h.var}%</span>`;
    const dotHtml   = h.dotacao ? fBRL(h.dotacao) : '–';
    const defHtml   = h.deficit
      ? `<span class="var-neg">(${fBRL(Math.abs(h.deficit))})</span>` : '–';
    const projTag   = h.proj ? '<span class="tag-proj">PROJ</span>' : '';
    const rowCls    = h.ano === 2026 ? 'row-2026' : '';
    tb.innerHTML += `<tr class="${rowCls}">
      <td>${h.ano}${projTag}</td>
      <td>${fBRL(h.total)}</td>
      <td>${varHtml}</td>
      <td>${dotHtml}</td>
      <td>${defHtml}</td>
    </tr>`;
  });
})();

// ─── Gráfico histórico anual ──────────────────────────────────────
(function() {
  const anos   = HISTORICO.map(h => h.ano);
  const totais = HISTORICO.map(h => h.total);
  const cores  = HISTORICO.map(h =>
    h.ano === 2021 ? 'rgba(21,101,192,.8)'  :
    h.ano === 2022 ? 'rgba(198,40,40,.8)'   :
    h.ano === 2023 ? 'rgba(130,130,130,.8)' :
    h.ano === 2024 ? 'rgba(230,161,0,.85)'  :
    h.ano === 2025 ? 'rgba(21,101,192,.85)' :
                     'rgba(198,40,40,.9)'
  );

  new Chart(document.getElementById('histChart'), {
    type: 'bar',
    data: {
      labels: anos,
      datasets: [{
        label: 'Total Anual',
        data: totais,
        backgroundColor: cores,
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fBRL(ctx.raw),
            afterLabel: ctx => {
              const h = HISTORICO[ctx.dataIndex];
              return h.var != null ? `  Var: ${h.var > 0 ? '+' : ''}${h.var}%` : '';
            }
          }
        },
        datalabels: { display: false }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11, weight: '600' } } },
        y: {
          grid: { color: '#f0f0f0' },
          ticks: {
            callback: v => 'R$ ' + (v / 1e6).toFixed(0) + ' Mi',
            font: { size: 10 }
          }
        }
      }
    },
    plugins: [{
      id: 'valueLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data } = chart;
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          meta.data.forEach((bar, idx) => {
            const val = dataset.data[idx];
            const h = HISTORICO[idx];
            ctx.save();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 10px Segoe UI';
            ctx.textAlign = 'center';
            const label = (val / 1e6).toFixed(1) + ' Mi';
            ctx.fillText(label, bar.x, bar.y - 6);
            if (h.var != null) {
              ctx.fillStyle = h.var >= 0 ? '#2e7d32' : '#c62828';
              ctx.font = '9px Segoe UI';
              ctx.fillText((h.var > 0 ? '+' : '') + h.var + '%', bar.x, bar.y - 17);
            }
            ctx.restore();
          });
        });
      }
    }]
  });
})();

// ─── Gráfico mensal 2026 ──────────────────────────────────────────
(function() {
  const allData = [
    ...MESES_2026.real.map(v => ({ v, proj: false })),
    ...MESES_2026.proj.map(v => ({ v, proj: true })),
  ];

  new Chart(document.getElementById('mensalChart'), {
    type: 'bar',
    data: {
      labels: MESES_2026.labels,
      datasets: [
        {
          label: 'Realizado',
          data: [...MESES_2026.real, ...Array(7).fill(null)],
          backgroundColor: 'rgba(0,52,122,.8)',
          borderRadius: 4,
        },
        {
          label: 'Projeção',
          data: [...Array(5).fill(null), ...MESES_2026.proj],
          backgroundColor: 'rgba(230,81,0,.75)',
          borderRadius: 4,
        },
        {
          label: 'Meta mensal (dot÷12)',
          data: Array(12).fill(+(5983169/12).toFixed(0)),
          type: 'line',
          borderColor: '#2e7d32',
          borderWidth: 2,
          borderDash: [5, 3],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 11, padding: 8 } },
        tooltip: { callbacks: { label: ctx => ' ' + fBRL(ctx.raw) } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: {
          grid: { color: '#f0f0f0' },
          ticks: { callback: v => fBRL(v), font: { size: 9 } }
        }
      }
    }
  });
})();
</script>
</body>
</html>
